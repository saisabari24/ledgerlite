services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledgerlite
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ledgerlite
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerlite"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://ledgerlite:${DB_PASSWORD}@postgres:5432/ledgerlite?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: http://${DOMAIN}
      UPLOADS_DIR: /app/uploads
      PORT: 3001
      NODE_ENV: production
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-true}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://${DOMAIN}
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - internal

volumes:
  pg_data:
    name: ledgerlite_pg_data
  uploads:
    name: ledgerlite_uploads
  caddy_data:
    name: ledgerlite_caddy_data
  caddy_config:
    name: ledgerlite_caddy_config

networks:
  internal:
    name: ledgerlite_internal
